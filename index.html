<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recherche de Cantiques</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section class="card">
      <h1>Recherche de Cantiques</h1>
      <p class="subtitle">Entrez un numéro pour afficher le texte correspondant.</p>

      <button id="themeToggle" class="theme-toggle">Mode clair</button>

      <input 
        type="text"
        id="numeroInput" 
        placeholder="Exemple : 1" 
        autocomplete="off"
      />



      <div id="resultat" class="resultat">
        <p class="empty">Aucun cantique sélectionné.</p>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="app.js"></script>
</body>

<div id="splashScreen" class="splash-screen">
  <div class="splash-content">
    <div class="splash-icon">📖</div>
    <h1>CANTIQUES</h1>
    <p>“Que tout ce qui respire loue l'Éternel.”</p>
    <span>Psaume 150:6</span>

    <div class="loader">
      <div></div>
      <div></div>
      <div></div>
    </div>
  </div>
</div>

</html>
